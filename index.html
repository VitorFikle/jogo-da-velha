<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Jogo da Velha</title>
</head>

<body>

    <main>

        <h1 class="title">Jogo da Velha</h1>

        <button id="darkModeButton" aria-label="Alternar modo escuro"></button>

        <div id="grade" role="grid">
            <button class="casa" aria-label="Casa 1"></button>
            <button class="casa" aria-label="Casa 2"></button>
            <button class="casa" aria-label="Casa 3"></button>
            <button class="casa" aria-label="Casa 4"></button>
            <button class="casa" aria-label="Casa 5"></button>
            <button class="casa" aria-label="Casa 6"></button>
            <button class="casa" aria-label="Casa 7"></button>
            <button class="casa" aria-label="Casa 8"></button>
            <button class="casa" aria-label="Casa 9"></button>
        </div>

        <p class="gameInfo">É a vez do jogador X.</p>

        <button id="reset">Reiniciar o Jogo</button>

    </main>

    <script src="script.js"></script>
</body>

</html>
